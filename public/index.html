<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票30分钟K线图</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }
        .header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 {
            font-size: 16px;
            font-weight: 600;
        }
        .stock-info {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        .stock-code, .cost-badge {
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
        }
        .stock-code {
            background: #1f6feb;
            color: white;
        }
        .cost-badge {
            background: #fbbf24;
            color: #0d1117;
        }
        .status {
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
        }
        .status.loading {
            display: block;
            background: rgba(31, 111, 235, 0.15);
            color: #58a6ff;
        }
        .status.success {
            display: block;
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }
        .status.error {
            display: block;
            background: rgba(248, 81, 73, 0.15);
            color: #f85149;
        }
        .chart-container {
            width: 100%;
            height: calc(100vh - 110px);
        }
        #klineChart {
            width: 100%;
            height: 100%;
        }
        .center-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 12px;
            text-align: center;
            padding: 20px;
        }
        .center-message.error {
            color: #f85149;
        }
        .center-message a {
            color: #58a6ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div id="paramError" class="center-message error" style="display: none;">
        <p>缺少必要参数</p>
        <p id="paramErrorMsg"></p>
    </div>

    <div id="app" style="display: none;">
        <div class="header">
            <h1 id="headerTitle">30分钟K线图</h1>
            <div class="stock-info">
                <span class="stock-code" id="stockCode"></span>
                <span class="cost-badge" id="costBadge"></span>
                <span id="dateRange"></span>
            </div>
        </div>
        <div id="uploadStatus" class="status"></div>
        <div class="chart-container">
            <div id="klineChart"></div>
        </div>
    </div>

    <script>
        function getQueryParam(param) {
            return new URLSearchParams(window.location.search).get(param);
        }

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function showParamError(msg) {
            document.getElementById('paramError').style.display = 'flex';
            document.getElementById('paramErrorMsg').textContent = msg;
        }

        function setStatus(el, type, text) {
            el.className = 'status ' + type;
            el.textContent = text;
        }

        async function uploadChart(recordId, code, date, cost) {
            const statusEl = document.getElementById('uploadStatus');
            setStatus(statusEl, 'loading', '正在生成K线图并上传至飞书...');
            try {
                const response = await fetch(`/api/chart?record_id=${encodeURIComponent(recordId)}&code=${encodeURIComponent(code)}&date=${encodeURIComponent(date)}&cost=${encodeURIComponent(cost)}`);
                const result = await response.json();
                if (result.success) {
                    setStatus(statusEl, 'success', `已上传至飞书记录 ${recordId}（${result.klines_count} 根K线）`);
                } else {
                    setStatus(statusEl, 'error', `上传失败：${result.error || '未知错误'}`);
                }
            } catch (err) {
                setStatus(statusEl, 'error', `上传失败：${err.message}`);
            }
        }

        async function loadChart(code, date, cost) {
            document.getElementById('stockCode').textContent = code;
            document.getElementById('costBadge').textContent = `成本 ${parseFloat(cost).toFixed(2)}`;
            document.getElementById('headerTitle').textContent = `${code} 30分钟K线图`;

            try {
                const response = await fetch(`/api/kline?code=${encodeURIComponent(code)}&date=${encodeURIComponent(date)}`);
                const result = await response.json();
                if (!result.success || !result.klines || result.klines.length === 0) {
                    throw new Error(result.error || '未获取到K线数据');
                }
                // 用后端返回的实际数据范围显示
                const firstDate = result.klines[0].day.split(' ')[0];
                const lastDate = result.klines[result.klines.length - 1].day.split(' ')[0];
                document.getElementById('dateRange').textContent = `${firstDate} ~ ${lastDate}`;
                renderChart(result.klines, parseFloat(cost));
            } catch (err) {
                document.getElementById('dateRange').textContent = '';
                document.getElementById('klineChart').innerHTML = `<div class="center-message error"><p>加载K线数据失败</p><p>${err.message}</p></div>`;
            }
        }

        function renderChart(klines, cost) {
            const dates = [];
            const ohlc = [];
            const volumes = [];

            klines.forEach(k => {
                const o = +k.open, c = +k.close, h = +k.high, l = +k.low;
                dates.push(k.day);
                ohlc.push([o, c, l, h]);
                volumes.push({
                    value: +k.volume,
                    itemStyle: { color: c >= o ? 'rgba(239,68,68,0.8)' : 'rgba(34,197,94,0.8)' }
                });
            });

            const chartDom = document.getElementById('klineChart');
            const myChart = echarts.init(chartDom);

            const option = {
                backgroundColor: '#0d1117',
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' }
                },
                axisPointer: {
                    link: [{ xAxisIndex: 'all' }],
                    label: { backgroundColor: '#30363d' }
                },
                grid: [
                    { left: '60', right: '40', top: '50', height: '55%' },
                    { left: '60', right: '40', top: '62%', height: '15%' }
                ],
                xAxis: [
                    {
                        type: 'category',
                        data: dates,
                        scale: true,
                        boundaryGap: true,
                        axisLine: { lineStyle: { color: '#30363d' } },
                        splitLine: { show: false },
                        axisLabel: { color: '#8b949e', formatter: v => v.split(' ')[0].split('-').slice(1).join('-') }
                    },
                    {
                        type: 'category',
                        gridIndex: 1,
                        data: dates,
                        axisLabel: { show: false }
                    }
                ],
                yAxis: [
                    {
                        scale: true,
                        splitArea: { show: true, areaStyle: { color: ['rgba(13,17,23,0.3)', 'rgba(22,27,34,0.3)'] } },
                        axisLine: { lineStyle: { color: '#30363d' } },
                        splitLine: { show: true, lineStyle: { color: '#21262d' } },
                        axisLabel: { color: '#8b949e' }
                    },
                    {
                        gridIndex: 1,
                        splitNumber: 2,
                        axisLabel: { show: false },
                        splitLine: { show: false }
                    }
                ],
                dataZoom: [
                    { type: 'inside', xAxisIndex: [0, 1], start: 0, end: 100 },
                    { type: 'slider', xAxisIndex: [0, 1], start: 0, end: 100, bottom: 10, borderColor: '#30363d', fillerColor: 'rgba(31,111,235,0.2)', handleStyle: { color: '#1f6feb' }, textStyle: { color: '#8b949e' } }
                ],
                series: [
                    {
                        type: 'candlestick',
                        data: ohlc,
                        itemStyle: {
                            color: '#ef4444',
                            color0: '#22c55e',
                            borderColor: '#ef4444',
                            borderColor0: '#22c55e'
                        },
                        markLine: {
                            symbol: ['none', 'none'],
                            label: {
                                show: true,
                                position: 'insideStartTop',
                                color: '#fbbf24',
                                backgroundColor: 'rgba(13,17,23,0.8)',
                                padding: [3, 6],
                                formatter: `成本 ${cost.toFixed(2)}`
                            },
                            lineStyle: { color: '#fbbf24', type: 'dashed', width: 1.5 },
                            data: [{ yAxis: cost }]
                        }
                    },
                    {
                        type: 'bar',
                        xAxisIndex: 1,
                        yAxisIndex: 1,
                        data: volumes,
                        barWidth: '60%'
                    }
                ]
            };

            myChart.setOption(option);
            window.addEventListener('resize', () => myChart.resize());
        }

        async function init() {
            const recordId = getQueryParam('record_id');
            const code = getQueryParam('code');
            const date = getQueryParam('date');
            const cost = getQueryParam('cost');

            if (!recordId || !code || !date || !cost) {
                showParamError('需要参数：record_id、code、date、cost');
                return;
            }
            if (!/^\d{6}$/.test(code)) {
                showParamError('股票代码必须是6位数字');
                return;
            }
            if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) {
                showParamError('日期格式必须是 YYYY-MM-DD');
                return;
            }
            if (isNaN(parseFloat(cost))) {
                showParamError('买入价格必须是数字');
                return;
            }

            document.getElementById('app').style.display = 'block';
            loadChart(code, date, cost);
            uploadChart(recordId, code, date, cost);
        }

        init();
    </script>
</body>
</html>
